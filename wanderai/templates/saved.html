{% extends 'base.html' %}
{% block title %}Saved{% endblock %}
{% block content %}
<section class="page-heading">
    <h1>Saved</h1>
</section>

<section class="toolbar-row">
    <div class="page-search">
        <span class="search-icon"></span>
        <input id="saved-search" type="text" placeholder="Search...">
        <button type="button" id="saved-search-btn" class="solid-chip">Search</button>
    </div>
    <label class="sort-box">
        <span>Sort by:</span>
        <select id="saved-sort">
            <option value="newest">Newest first</option>
            <option value="name-asc">Ascending (A-Z)</option>
            <option value="risk-low">Low Risk First</option>
        </select>
    </label>
</section>

<div class="destination-grid four-col" id="saved-grid"></div>
<div class="saved-empty empty-state hidden" id="saved-empty">
    <img src="{{ url_for('static', filename='images/empty.svg') }}?v=20260403" alt="Empty saved state" class="saved-empty-image" width="120">
    <h3>No saved destinations yet</h3>
    <p>Start exploring and save your favorite places!</p>
    <a href="{{ url_for('explore') }}" class="solid-chip">Explore Destinations</a>
</div>
<div class="pagination-row" id="saved-pagination"></div>
{% endblock %}
