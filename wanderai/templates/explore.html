{% extends 'base.html' %}
{% block title %}Explore{% endblock %}
{% block content %}
<section class="page-heading">
    <h1>Explore</h1>
</section>

<section class="toolbar-row">
    <div class="page-search">
        <span class="search-icon"></span>
        <input id="explore-search" type="text" placeholder="Discover the sites you want to visit">
        <button type="button" id="explore-search-btn" class="solid-chip">Search</button>
    </div>
    <label class="sort-box">
        <span>Sort by:</span>
        <select id="explore-sort">
            <option value="name-asc">Ascending (A-Z)</option>
            <option value="name-desc">Descending (Z-A)</option>
            <option value="risk-low">Low Risk First</option>
            <option value="risk-high">Moderate Risk First</option>
        </select>
    </label>
</section>

<section class="tab-row" id="explore-filters">
    <button type="button" class="filter-tab active" data-category="All">All</button>
    <button type="button" class="filter-tab" data-category="Nature">Nature</button>
    <button type="button" class="filter-tab" data-category="Adventure">Adventure</button>
    <button type="button" class="filter-tab" data-category="Relaxation">Relaxation</button>
    <button type="button" class="filter-tab" data-category="Sightseeing">Sightseeing</button>
</section>

<div class="destination-grid four-col" id="explore-grid"></div>
<div class="pagination-row" id="explore-pagination"></div>
{% endblock %}
