{% extends 'base.html' %}
{% block title %}AI Recommendations{% endblock %}
{% block content %}
<section class="breadcrumb-heading">
    <h1>AI Trip Recommendations</h1>
    <span>/ Trip Planning</span>
</section>

<section class="trip-results-stack">
    <div id="recommendation-summary" class="trip-results-summary"></div>
<div id="recommendation-metrics" class="trip-results-metrics"></div>
    <section id="constraint-summary" class="trip-results-constraints" style="background: #f8f9ff; padding: 24px; border-radius: 12px; margin: 24px 0;">
        <!-- Multi-constraint summary rendered by JS -->
    </section>
    <div id="goal-mapping-summary" class="trip-results-goals"></div>

    <section>
        <div class="agenda-header-row" style="margin-bottom: 18px;">
            <h4>Recommended Destinations</h4>
            <a href="{{ url_for('itinerary') }}" class="outline-chip">View itinerary</a>
        </div>
        <div class="destination-grid two-col-narrow" id="handpicked-grid">
            <p class="trip-helper-copy" style="padding: 16px 0;">Loading recommendations...</p>
        </div>
    </section>

    <section id="recommendation-reasoning" class="trip-results-reasoning"></section>
</section>
{% endblock %}
