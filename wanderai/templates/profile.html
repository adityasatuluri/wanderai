{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<section class="profile-hero profile-header">
    <div class="profile-hero-shape profile-shape-one"></div>
    <div class="profile-hero-shape profile-shape-two"></div>
    <div class="profile-hero-media">
        <div class="profile-hero-avatar profile-avatar"></div>
        <div class="profile-hero-badge">Explorer</div>
    </div>
    <div class="profile-hero-copy">
        <p class="profile-eyebrow">Traveler Profile</p>
        <h1 class="userName">Athira Sajikumar</h1>
        <p>Wanderer since 2020. Curating scenic escapes, cultural city breaks, and slow itineraries built around nature.</p>
    </div>
    <button type="button" class="solid-chip" id="profile-primary-action">Edit Profile</button>
</section>

<section class="profile-info-card">
    <div class="section-heading no-margin">
        <h2>Personal Info.</h2>
        <button type="button" class="outline-chip" id="profile-edit-toggle">Edit</button>
    </div>
    <div class="profile-info-grid">
        <label><span>Full Name</span><input id="profile-full-name" type="text" readonly></label>
        <label><span>Email</span><input id="profile-email" type="text" readonly></label>
        <label><span>Place</span><input id="profile-place" type="text" readonly></label>
    </div>
</section>

<section class="profile-goal-card">
    <h2>My Goal</h2>
    <div class="profile-goal-row">
        <input id="profile-goal" type="text" value="Nature" readonly>
        <a href="{{ url_for('goal') }}" class="solid-chip blue-chip">Change</a>
    </div>
</section>
{% endblock %}
